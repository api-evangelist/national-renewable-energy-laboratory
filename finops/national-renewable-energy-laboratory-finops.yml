specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: National Renewable Energy Laboratory
providerId: national-renewable-energy-laboratory
publisherName: National Renewable Energy Laboratory
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Energy
  - Renewable Energy
  - Federal Government
  - Climate
  - Research
  - FinOps
  - Cost Management
  - FOCUS
description: FinOps framework definition for the National Renewable Energy Laboratory API surface. Provides
  a FOCUS-aligned mapping for cost allocation, usage measurement, and unit-economics reporting across
  the provider's APIs.
principles:
  - name: Visibility
    description: Make API consumption costs visible to engineering, product, and finance teams in near
      real-time.
  - name: Allocation
    description: Tag every chargeable API call with the consuming team, environment, application, and
      feature so cost can be allocated.
  - name: Optimization
    description: Continuously evaluate request patterns, caching, batching, and tier selection to reduce
      cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: National Renewable Energy Laboratory
  ServiceCategory: Developer Tools / API
  ProviderName: National Renewable Energy Laboratory
  PublisherName: National Renewable Energy Laboratory
  InvoiceIssuerName: National Renewable Energy Laboratory
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of billable API requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - region
      - consumer
  - name: data_egress
    description: Bytes returned over the network in API responses
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - region
      - consumer
  - name: compute_seconds
    description: Server-side compute consumed by the request, where applicable
    unit: second
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
apis:
  - name: NREL Developer Network
    baseURL: https://developer.nrel.gov/api/
    tags:
      - Energy
      - Renewable Energy
    serviceName: NREL Developer Network
    serviceCategory: API
  - name: Alternative Fuel Stations
    baseURL: https://developer.nrel.gov/api/alt-fuel-stations/v1/
    tags:
      - Transportation
      - Alternative Fuel
    serviceName: Alternative Fuel Stations
    serviceCategory: API
  - name: PVWatts
    baseURL: https://developer.nrel.gov/api/pvwatts/v8/
    tags:
      - Solar
      - Modeling
    serviceName: PVWatts
    serviceCategory: API
  - name: Utility Rates
    baseURL: https://developer.nrel.gov/api/utility_rates/v3/
    tags:
      - Electricity
      - Rates
    serviceName: Utility Rates
    serviceCategory: API
  - name: Solar Resource Data
    baseURL: https://developer.nrel.gov/api/solar/solar_resource/v1/
    tags:
      - Solar
      - Climate
    serviceName: Solar Resource Data
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
