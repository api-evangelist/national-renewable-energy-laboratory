naftiko: 1.0.0-alpha2
info:
  label: NREL Developer Network APIs
  description: 'NREL Developer Network APIs. 5 operations. Lead operation: Search alternative fuel stations. Self-contained
    Naftiko capability covering one National Renewable Energy Laboratory business surface.'
  tags:
  - National Renewable Energy Laboratory
  - NREL Developer Network APIs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NATIONAL_RENEWABLE_ENERGY_LABORATORY_API_KEY: NATIONAL_RENEWABLE_ENERGY_LABORATORY_API_KEY
capability:
  consumes:
  - type: http
    namespace: national-renewable-energy-laboratory
    baseUri: https://developer.nrel.gov/api
    description: NREL Developer Network APIs business capability. Self-contained, no shared references.
    resources:
    - name: alt-fuel-stations-v1.json
      path: /alt-fuel-stations/v1.json
      operations:
      - name: get
        method: GET
        description: Search alternative fuel stations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fuel_type
          in: query
          type: string
          description: Comma-separated list (e.g., ELEC,LPG,CNG).
        - name: state
          in: query
          type: string
        - name: zip
          in: query
          type: string
        - name: status
          in: query
          type: string
        - name: access
          in: query
          type: string
        - name: limit
          in: query
          type: integer
    - name: alt-fuel-stations-v1-nearest.json
      path: /alt-fuel-stations/v1/nearest.json
      operations:
      - name: get
        method: GET
        description: Find nearest alternative fuel stations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: location
          in: query
          type: string
          description: Address or place name.
        - name: latitude
          in: query
          type: number
        - name: longitude
          in: query
          type: number
        - name: radius
          in: query
          type: number
          description: Search radius in miles.
        - name: fuel_type
          in: query
          type: string
    - name: pvwatts-v8.json
      path: /pvwatts/v8.json
      operations:
      - name: get
        method: GET
        description: PVWatts solar PV system production estimate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: system_capacity
          in: query
          type: number
          description: System size in kW DC.
          required: true
        - name: module_type
          in: query
          type: integer
          required: true
        - name: losses
          in: query
          type: number
          required: true
        - name: array_type
          in: query
          type: integer
          required: true
        - name: tilt
          in: query
          type: number
          required: true
        - name: azimuth
          in: query
          type: number
          required: true
        - name: address
          in: query
          type: string
        - name: lat
          in: query
          type: number
        - name: lon
          in: query
          type: number
        - name: timeframe
          in: query
          type: string
    - name: solar-solar_resource-v1.json
      path: /solar/solar_resource/v1.json
      operations:
      - name: get
        method: GET
        description: Solar resource data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: address
          in: query
          type: string
        - name: lat
          in: query
          type: number
        - name: lon
          in: query
          type: number
    - name: utility_rates-v3.json
      path: /utility_rates/v3.json
      operations:
      - name: get
        method: GET
        description: Utility electricity rates by location
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: address
          in: query
          type: string
        - name: lat
          in: query
          type: number
        - name: lon
          in: query
          type: number
    authentication:
      type: apikey
      key: api_key
      value: '{{env.NATIONAL_RENEWABLE_ENERGY_LABORATORY_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: national-renewable-energy-laboratory-rest
    port: 8080
    description: REST adapter for NREL Developer Network APIs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/alt-fuel-stations/v1-json
      name: alt-fuel-stations-v1-json
      description: REST surface for alt-fuel-stations-v1.json.
      operations:
      - method: GET
        name: get
        description: Search alternative fuel stations
        call: national-renewable-energy-laboratory.get
        with:
          fuel_type: rest.fuel_type
          state: rest.state
          zip: rest.zip
          status: rest.status
          access: rest.access
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/alt-fuel-stations/v1/nearest-json
      name: alt-fuel-stations-v1-nearest-json
      description: REST surface for alt-fuel-stations-v1-nearest.json.
      operations:
      - method: GET
        name: get
        description: Find nearest alternative fuel stations
        call: national-renewable-energy-laboratory.get
        with:
          location: rest.location
          latitude: rest.latitude
          longitude: rest.longitude
          radius: rest.radius
          fuel_type: rest.fuel_type
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pvwatts/v8-json
      name: pvwatts-v8-json
      description: REST surface for pvwatts-v8.json.
      operations:
      - method: GET
        name: get
        description: PVWatts solar PV system production estimate
        call: national-renewable-energy-laboratory.get
        with:
          system_capacity: rest.system_capacity
          module_type: rest.module_type
          losses: rest.losses
          array_type: rest.array_type
          tilt: rest.tilt
          azimuth: rest.azimuth
          address: rest.address
          lat: rest.lat
          lon: rest.lon
          timeframe: rest.timeframe
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/solar/solar-resource/v1-json
      name: solar-solar-resource-v1-json
      description: REST surface for solar-solar_resource-v1.json.
      operations:
      - method: GET
        name: get
        description: Solar resource data
        call: national-renewable-energy-laboratory.get
        with:
          address: rest.address
          lat: rest.lat
          lon: rest.lon
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/utility-rates/v3-json
      name: utility-rates-v3-json
      description: REST surface for utility_rates-v3.json.
      operations:
      - method: GET
        name: get
        description: Utility electricity rates by location
        call: national-renewable-energy-laboratory.get
        with:
          address: rest.address
          lat: rest.lat
          lon: rest.lon
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: national-renewable-energy-laboratory-mcp
    port: 9090
    transport: http
    description: MCP adapter for NREL Developer Network APIs. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: search-alternative-fuel-stations
      description: Search alternative fuel stations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: national-renewable-energy-laboratory.get
      with:
        fuel_type: tools.fuel_type
        state: tools.state
        zip: tools.zip
        status: tools.status
        access: tools.access
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: find-nearest-alternative-fuel-stations
      description: Find nearest alternative fuel stations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: national-renewable-energy-laboratory.get
      with:
        location: tools.location
        latitude: tools.latitude
        longitude: tools.longitude
        radius: tools.radius
        fuel_type: tools.fuel_type
      outputParameters:
      - type: object
        mapping: $.
    - name: pvwatts-solar-pv-system-production
      description: PVWatts solar PV system production estimate
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: national-renewable-energy-laboratory.get
      with:
        system_capacity: tools.system_capacity
        module_type: tools.module_type
        losses: tools.losses
        array_type: tools.array_type
        tilt: tools.tilt
        azimuth: tools.azimuth
        address: tools.address
        lat: tools.lat
        lon: tools.lon
        timeframe: tools.timeframe
      outputParameters:
      - type: object
        mapping: $.
    - name: solar-resource-data
      description: Solar resource data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: national-renewable-energy-laboratory.get
      with:
        address: tools.address
        lat: tools.lat
        lon: tools.lon
      outputParameters:
      - type: object
        mapping: $.
    - name: utility-electricity-rates-location
      description: Utility electricity rates by location
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: national-renewable-energy-laboratory.get
      with:
        address: tools.address
        lat: tools.lat
        lon: tools.lon
      outputParameters:
      - type: object
        mapping: $.
